name: Superadmin Validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Typecheck diagnostic
        shell: bash
        run: |
          set -o pipefail
          git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" "https://github.com/$GITHUB_REPOSITORY.git" source
          cd source
          npx --yes pnpm@11.9.0 install --no-frozen-lockfile --reporter=silent
          npx --yes pnpm@11.9.0 typecheck 2>&1 | tail -n 100
