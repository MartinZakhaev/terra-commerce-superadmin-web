name: Superadmin Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check package versions
        run: npm view pnpm version && npm view nuxt@4.4.8 version && npm view vue-tsc version
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Generate static application
        run: pnpm generate
