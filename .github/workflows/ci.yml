name: Superadmin Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Install dependencies
        run: npx --yes pnpm@11.9.0 install --no-frozen-lockfile --reporter=silent
      - name: Typecheck
        run: npx --yes pnpm@11.9.0 typecheck
      - name: Generate static application
        run: npx --yes pnpm@11.9.0 generate
